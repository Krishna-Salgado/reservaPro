<!-- Form Container -->

<script>
        // Dark Mode Logic
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlDoc = document.documentElement;

        // Check for saved theme preference or OS preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlDoc.classList.add('dark');
            htmlDoc.classList.remove('light');
        } else {
            htmlDoc.classList.remove('dark');
            htmlDoc.classList.add('light');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlDoc.classList.toggle('dark');
            htmlDoc.classList.toggle('light');
            if (htmlDoc.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        // Tab Switching Logic
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            // Reset styles
            const activeClasses = ['border-[#6366F1]', 'text-[#6366F1]'];
            const inactiveClasses = ['border-transparent', 'text-secondary', 'dark:text-secondary-fixed-dim'];

            if (tab === 'login') {
                // Style Tabs
                tabLogin.classList.add(...activeClasses);
                tabLogin.classList.remove(...inactiveClasses);
                tabRegister.classList.add(...inactiveClasses);
                tabRegister.classList.remove(...activeClasses);

                // Animate Forms
                loginForm.classList.remove('opacity-0', '-z-10', '-translate-x-8', 'pointer-events-none');
                loginForm.classList.add('opacity-100', 'z-10', 'translate-x-0');
                
                registerForm.classList.remove('opacity-100', 'z-10', 'translate-x-0');
                registerForm.classList.add('opacity-0', '-z-10', 'translate-x-8', 'pointer-events-none');
            } else {
                // Style Tabs
                tabRegister.classList.add(...activeClasses);
                tabRegister.classList.remove(...inactiveClasses);
                tabLogin.classList.add(...inactiveClasses);
                tabLogin.classList.remove(...activeClasses);

                // Animate Forms
                registerForm.classList.remove('opacity-0', '-z-10', 'translate-x-8', 'pointer-events-none');
                registerForm.classList.add('opacity-100', 'z-10', 'translate-x-0');
                
                loginForm.classList.remove('opacity-100', 'z-10', 'translate-x-0');
                loginForm.classList.add('opacity-0', '-z-10', '-translate-x-8', 'pointer-events-none');
            }
        }
    </script>
